<!DOCTYPE html>
<html>
<head>
<title>Название страницы</title>
</head>
<body>
<p>Дата доставки.</p>
<script>
	function calculateDeliveryDate(val1) {
    // Создаем новый объект даты, представляющий текущую дату и время
    var today = new Date();
    var hours = today.getHours();
    
   // Инициализируем переменную daysToAdd
    var daysToAdd = 0;

    // Проверка переменной 1
    if(val1) {
        // Проверяем, выходной ли сегодня
        if (today.getDay() === 0 || today.getDay() === 6) {
            // если сегодня выходной, установить daysToAdd на следующий вторник
            daysToAdd = 2 - today.getDay();
        } else {
           // если сегодня не выходной, проверяем час дня
            daysToAdd = (hours >= 16) ? 2 : 1;
        }
    } else {
    // Проверка переменной 2
    daysToAdd = (today.getDay() >= 1 && today.getDay() <=5) ? 4 : 2 + (5 - today.getDay());
    }

    // создаем новый объект даты, представляющий дату доставки
    var deliveryDate = new Date();
    // устанавливаем дату доставки, добавляя количество дней к текущей дате
    deliveryDate.setDate(deliveryDate.getDate() + daysToAdd);
   // Проверка переменной 1
    if(val1) {
        // установить год, месяц и число для даты доставки
        deliveryDate.setFullYear(today.getFullYear());
        deliveryDate.setMonth(today.getMonth());
        deliveryDate.setDate(today.getDate() + daysToAdd);

        
    }
    // возвращаем дату доставки
	document.write(`Дата доставки ${deliveryDate.getDate()}, ${deliveryDate.getMouth()}`);


    return deliveryDate;

}


calculateDeliveryDate(new Date())
</script>


</body>
</html>
